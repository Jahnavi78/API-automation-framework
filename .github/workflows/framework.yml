name: Run framework
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
jobs:
  framework:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: set up python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Run framework
        run: pytest -v
